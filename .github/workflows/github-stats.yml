name: Update GitHub Stats

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Check GitHub Token
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "METRICS_TOKEN is missing"
            exit 1
          fi

          echo "Token exists"
          echo "Token length: ${#GH_TOKEN}"

          curl \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/user

      - name: Generate stats SVG
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_USERNAME: OmAr-Kader
        run: |
          node scripts/generate-stats.js

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add github-stats.svg

          git commit -m "Update GitHub stats" || exit 0

          git push
