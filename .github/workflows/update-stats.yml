name: Update GitHub Stats

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@v2.0.1
        with:
          card: stats
          options: username=OmAr-Kader&theme=react&show_icons=true&include_all_commits=true
          path: assets/stats.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2.0.1
        with:
          card: top-langs
          options: username=OmAr-Kader&layout=donut-vertical&theme=react
          path: assets/top-langs.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Commit SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "Update GitHub stats" || exit 0
          git push
